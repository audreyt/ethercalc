# Default values for EtherCalc.
#
# IMPORTANT: EtherCalc's self-host image runs a single `workerd serve`
# process that owns all Durable Object state locally (under /data). Two
# replicas sharing the PVC will silently corrupt rooms — there's no
# consensus layer to keep them in sync. The chart enforces replicas: 1
# and strategy: Recreate. Do NOT override these.

image:
  repository: audreyt/ethercalc
  # Overrides Chart.yaml's appVersion if set. Leave empty to pin to the
  # chart-compatible image version.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# Restricted-profile defaults (SH-8). The image's unprivileged user is
# `bun` (uid/gid 1000); fsGroup makes the PVC writable without the
# entrypoint's root chown path, and the entrypoint never writes to the
# rootfs (socket override is a workerd CLI flag), so a read-only root
# filesystem works out of the box. /tmp is an emptyDir mount.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/limit-rps: "10"
    # nginx.ingress.kubernetes.io/limit-connections: "20"
  hosts:
    - host: ethercalc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: ethercalc-tls
  #    hosts:
  #      - ethercalc.local

resources:
  # Reasonable defaults for a small spreadsheet deployment. Raise `memory`
  # if rooms grow large — each live room holds its sheet in RAM.
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

persistence:
  # Durable Object state lives on disk under /data.
  # Disable only for ephemeral dev setups; production MUST have this on.
  enabled: true
  # Leave empty to use the cluster default storage class.
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  # Retain the PVC when the chart is uninstalled so data survives a
  # `helm uninstall` + `helm install` cycle.
  existingClaim: ""

# Runtime configuration. These map 1:1 to the env vars documented in the
# README's "Environment variables" table.
config:
  # Base URL prefix when EtherCalc sits behind a reverse proxy at a sub-path.
  basepath: ""
  # When set, EtherCalc redirects `/` to this room name.
  defaultRoom: ""
  # Hide `/_rooms`, `/_roomlinks`, `/_roomtimes`, and `/_exists/:room`.
  disableRoomIndex: true
  # Legacy room-index gate. The Worker currently emits CORS headers
  # unconditionally for embed compatibility.
  cors: false
  # Seconds of inactivity before a room is pruned. Leave empty to disable.
  expire: ""
  # Optional in-Worker per-IP HTTP limit (off by default). "1" = 10 req/s;
  # belt-and-suspenders behind ingress rate limits — not a substitute.
  rateLimit: ""

# Secrets held in a Kubernetes Secret, never in values.yaml plaintext in
# production. Set `existingSecret: <name>` to reference an external Secret
# you created out-of-band; otherwise the chart will create one from these
# fields at install time.
secrets:
  existingSecret: ""
  # HMAC key for read-only vs. edit auth. Generate with e.g. `openssl rand -hex 32`.
  key: ""
  # Bearer token gating `PUT /_migrate/seed/:room`. Required for
  # `ethercalc migrate --token ...`.
  migrateToken: ""

livenessProbe:
  httpGet:
    path: /_health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /_health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
