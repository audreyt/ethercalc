name = "ethercalc"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Durable Object: one instance per spreadsheet room.
# Holds live SocialCalc state, WebSocket clients, and the snapshot/log/audit
# storage. See CLAUDE.md §3.2 and §3.3.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Default vars — overridden per-deploy by `wrangler secret put` or
# wrangler.toml overlays. `ETHERCALC_KEY` is unset by default (anonymous
# mode / identity HMAC); production deploys should run
# `wrangler secret put ETHERCALC_KEY` instead of committing a value.
# `BASEPATH` is empty by default (legacy `--basepath` CLI flag).
#
# §13 Q6: the CLI (`bin/ethercalc --key …`, Phase 11) will also set
# ETHERCALC_KEY in the Miniflare env for self-host parity.
[vars]
BASEPATH = ""

# Workers Assets binding (Phase 4.1/11). `directory` is resolved relative
# to this wrangler.toml, so it points up two levels to the repo-root
# `assets/` produced by `scripts/build-assets.sh`. That script copies the
# curated set of static files (index.html, start.html, panels.html,
# icons, manifest.appcache, manifest.json, l10n/*.json, the built
# single-sheet client at static/player.js, the SocialCalc runtime at
# static/socialcalc.js, and the multi-sheet React app under multi/).
#
# The legacy repo root contains `node_modules/` and other >25 MiB files
# that trip Workers' per-asset size limit, so we point at the curated
# directory instead of `./`. Also `assets/` is .gitignored — CI rebuilds
# it before `wrangler deploy --dry-run`.
#
# Runtime fallback: when `ASSETS` is unbound (test env), the route layer
# at `src/routes/assets.ts` returns 404. Integration tests stub the
# binding with a mock Fetcher to exercise the proxied path.
[assets]
directory = "../../assets"
binding = "ASSETS"

# D1, KV, R2, cron, send_email bindings will be added in subsequent phases
# as they are used. Scaffolding them eagerly would force empty bindings
# into the local Miniflare state and muddy the test environment.
