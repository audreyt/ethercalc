name = "ethercalc"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Durable Object: one instance per spreadsheet room.
# Holds live SocialCalc state, WebSocket clients, and the snapshot/log/audit
# storage. See CLAUDE.md §3.2 and §3.3.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Default vars — overridden per-deploy by `wrangler secret put` or
# wrangler.toml overlays. `ETHERCALC_KEY` is unset by default (anonymous
# mode / identity HMAC); production deploys should run
# `wrangler secret put ETHERCALC_KEY` instead of committing a value.
# `BASEPATH` is empty by default (legacy `--basepath` CLI flag).
#
# §13 Q6: the CLI (`bin/ethercalc --key …`, Phase 11) will also set
# ETHERCALC_KEY in the Miniflare env for self-host parity.
[vars]
BASEPATH = ""

# Workers Assets binding (Phase 4.1/11). `directory` is resolved relative
# to this wrangler.toml, so it points up two levels to the repo-root
# `assets/` produced by `scripts/build-assets.sh`. That script copies the
# curated set of static files (index.html, start.html, panels.html,
# icons, manifest.appcache, manifest.json, l10n/*.json, the built
# single-sheet client at static/player.js, the SocialCalc runtime at
# static/socialcalc.js, and the multi-sheet React app under multi/).
#
# The legacy repo root contains `node_modules/` and other >25 MiB files
# that trip Workers' per-asset size limit, so we point at the curated
# directory instead of `./`. Also `assets/` is .gitignored — CI rebuilds
# it before `wrangler deploy --dry-run`.
#
# Runtime fallback: when `ASSETS` is unbound (test env), the route layer
# at `src/routes/assets.ts` returns 404. Integration tests stub the
# binding with a mock Fetcher to exercise the proxied path.
[assets]
directory = "../../assets"
binding = "ASSETS"

# KV, R2, cron, send_email bindings will be added in subsequent phases
# as they are used. Scaffolding them eagerly would force empty bindings
# into the local Miniflare state and muddy the test environment.

# D1 — cross-room index mirror (Phase 5.1). DO storage is the
# authoritative source of truth for a single room; this table provides
# the cross-room query surface needed by `/_rooms`, `/_roomlinks`,
# `/_roomtimes`. Mirror writes land in `src/room.ts` after every
# snapshot mutation; reads in `src/routes/rooms.ts` fall back to empty
# when the binding is absent (Node unit tests without Miniflare).
#
# Binding name is `DB`. Schema at `migrations/0001_rooms.sql`. The
# `database_id` placeholder is fine for local Miniflare and `wrangler
# deploy --dry-run` — a real id is required only for an actual
# `wrangler deploy`. See §10.2 for the Redis → D1 mapping table.
[[d1_databases]]
binding = "DB"
database_name = "ethercalc_rooms"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "./migrations"

# Load SocialCalc.js as a Text module so `new Function(rawSource)` inside
# `@ethercalc/socialcalc-headless` can eval it. The `?raw` Vite suffix
# handles this under vitest-pool-workers (Vite resolves it directly);
# wrangler's esbuild bundler needs an explicit rule, otherwise it tries
# to parse the 27k-line UMD (sloppy-mode `delete varname;` that esbuild
# rejects in strict ESM).
#
# Important: this rule is only consumed by `wrangler deploy`. The
# `vitest.config.ts` sets its miniflare options directly (no `wrangler:
# { configPath }`) so this rule doesn't leak into the vitest runner and
# mangle `?raw` imports with `?mf_vitest_force=Text`.
[[rules]]
type = "Text"
globs = ["**/SocialCalc.js?raw", "**/SocialCalc.js"]
fallthrough = true
