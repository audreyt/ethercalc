name = "ethercalc"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Durable Object: one instance per spreadsheet room.
# Holds live SocialCalc state, WebSocket clients, and the snapshot/log/audit
# storage. See CLAUDE.md §3.2 and §3.3.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Default vars — overridden per-deploy by `wrangler secret put` or
# wrangler.toml overlays. `ETHERCALC_KEY` is unset by default (anonymous
# mode / identity HMAC); production deploys should run
# `wrangler secret put ETHERCALC_KEY` instead of committing a value.
# `BASEPATH` is empty by default (legacy `--basepath` CLI flag).
#
# §13 Q6: the CLI (`bin/ethercalc --key …`, Phase 11) will also set
# ETHERCALC_KEY in the Miniflare env for self-host parity.
[vars]
BASEPATH = ""

# Workers Assets binding scaffold. Phase 4 wires the route layer but
# does NOT attach a live `[assets]` directory — the legacy repo root
# contains `node_modules/` and other >25 MiB files that trip Workers'
# per-asset size limit. Phase 11 (§8) lands a curated `assets/`
# directory (index.html, start.html, icons, manifest.appcache, l10n
# bundles) and re-enables this block. See `src/routes/assets.ts` for
# the runtime fallback that returns 404 when ASSETS is unbound.
#
# [assets]
# directory = "./dist/assets"
# binding = "ASSETS"

# D1, KV, R2, cron, send_email bindings will be added in subsequent phases
# as they are used. Scaffolding them eagerly would force empty bindings
# into the local Miniflare state and muddy the test environment.

# D1 scaffold — enumerate cross-room timestamps + CORS flags for the
# `/_rooms`, `/_roomlinks`, `/_roomtimes` routes. Left commented so
# Miniflare doesn't auto-create an empty database during tests; flip it
# on once Phase 5.1 supplies a migration seed.
#
# TODO(phase-5.1): wire this and backfill the handlers in src/routes/rooms.ts.
# [[d1_databases]]
# binding = "ROOMS_DB"
# database_name = "ethercalc_rooms"
# database_id = "00000000-0000-0000-0000-000000000000"
# migrations_dir = "./migrations"

# Load SocialCalc.js as a Text module so `new Function(rawSource)` inside
# `@ethercalc/socialcalc-headless` can eval it. The `?raw` Vite suffix
# handles this under vitest-pool-workers (Vite resolves it directly);
# wrangler's esbuild bundler needs an explicit rule, otherwise it tries
# to parse the 27k-line UMD (sloppy-mode `delete varname;` that esbuild
# rejects in strict ESM).
#
# Important: this rule is only consumed by `wrangler deploy`. The
# `vitest.config.ts` sets its miniflare options directly (no `wrangler:
# { configPath }`) so this rule doesn't leak into the vitest runner and
# mangle `?raw` imports with `?mf_vitest_force=Text`.
[[rules]]
type = "Text"
globs = ["**/SocialCalc.js?raw", "**/SocialCalc.js"]
fallthrough = true
