name: Deploy Docs

# Publish the Starlight site to Cloudflare Pages (project: ethercalc-docs).
# Requires repository secrets:
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account id
#   CLOUDFLARE_API_TOKEN — long-lived dashboard API token (preferred), OR
#   CLOUDFLARE_OAUTH_REFRESH_TOKEN — wrangler-login refresh token (scripts/ci-cloudflare-token.sh)
#
# Manual deploy only; wire DNS (e.g. docs.ethercalc.net) to the Pages project.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm docs deploy'
        required: true
        type: string

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    name: Cloudflare Pages (docs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: inputs.confirm == 'deploy'
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cloudflare API token
        run: ./scripts/ci-cloudflare-token.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_OAUTH_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_OAUTH_REFRESH_TOKEN }}

      - name: Build Starlight site
        run: bun run --cwd packages/docs build

      - name: Ensure Pages project exists
        run: |
          bun x wrangler pages project list | grep -q ethercalc-docs \
            || bun x wrangler pages project create ethercalc-docs --production-branch=main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: bun x wrangler pages deploy packages/docs/dist --project-name=ethercalc-docs --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  rejected:
    name: confirmation check
    runs-on: ubuntu-latest
    if: inputs.confirm != 'deploy'
    steps:
      - name: Abort — confirmation mismatch
        run: |
          echo 'Input confirm must be exactly "deploy". Got:' "${{ inputs.confirm }}"
          exit 1