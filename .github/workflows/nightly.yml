name: Nightly

# Phase 12 — see AGENTS.md §5.3 + §11.2 + docs/MUTATION_REPORT.md.
#
# Runs StrykerJS mutation testing across the six Node-env packages where
# istanbul coverage already works. Kept OUT of the PR-gate workflow
# (ci.yml) because each package is tens of seconds to minutes, and the
# full matrix is ~2 minutes total — too expensive to block merges on.
#
# Triggers:
#   - schedule: 06:00 UTC daily (~midnight PT, ~09:00 TW)
#   - workflow_dispatch: manual re-run for debugging / after config changes
#
# On `break` threshold crossing, the actions/github-script step opens a
# GitHub issue (idempotent — dedups against an existing open one with the
# matching label). Chose github-script over gh-commit-status because:
#   - We want a persistent notification, not a commit status (the nightly
#     doesn't run on a PR commit; it runs on `main`).
#   - Inline JS keeps the trigger logic visible in this file, no extra
#     action dependency.
#   - Dedup-by-label is a 5-line script vs. an action.

on:
  schedule:
    # 06:00 UTC daily — post-midnight on the US west coast, before most
    # Europe / Asia standups. Adjust if flakiness correlates with
    # contention against other nightly jobs.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated list of packages to mutate (default: all)'
        required: false
        default: 'shared,socketio-shim,migrate,oracle-harness,client,worker'

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation:
    name: mutation (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package:
          - shared
          - socketio-shim
          - migrate
          - oracle-harness
          - client
          - worker

    steps:
      - uses: actions/checkout@v6

      # voidzero-dev/setup-vp v1.1.0
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      # client requires a Vite build (player.js) to exist at
      # ../../assets/, and worker's integration tests require the same.
      # For mutation runs we only need the Node-env unit tests, so the
      # build step is skipped — faster CI, smaller blast radius.

      - name: Run Stryker — ${{ matrix.package }}
        id: stryker
        run: vp run --filter "./packages/${{ matrix.package }}" --fail-if-no-match mutation
        env:
          # Stryker respects CI for non-interactive output.
          CI: 'true'
        continue-on-error: true

      - name: Upload HTML + JSON reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-${{ matrix.package }}
          path: packages/${{ matrix.package }}/reports/mutation/
          retention-days: 14
          if-no-files-found: warn

      - name: Open issue on break-threshold regression
        if: steps.stryker.outcome == 'failure'
        uses: actions/github-script@v9
        env:
          PACKAGE: ${{ matrix.package }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const pkg = process.env.PACKAGE;
            const runUrl = process.env.RUN_URL;
            const label = `mutation-regression:${pkg}`;
            const title = `[mutation] ${pkg} dropped below break threshold`;

            // Ensure the label exists (idempotent).
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'b60205',
                description: `StrykerJS regression for packages/${pkg}`,
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = label already exists
            }

            // Dedup: skip if an open issue with the label already exists.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });
            if (existing.length > 0) {
              core.info(`Existing open issue #${existing[0].number}; not reopening.`);
              // But do add a comment so the timeline shows the new failure.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Another nightly run dropped below threshold: ${runUrl}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: [label, 'ci', 'quality'],
              body: [
                `The nightly StrykerJS job for \`packages/${pkg}\` scored below`,
                `the \`break\` threshold configured in`,
                `\`packages/${pkg}/stryker.conf.json\`.`,
                ``,
                `- Run: ${runUrl}`,
                `- Artifact: \`mutation-report-${pkg}\` (HTML report)`,
                `- Baseline report: \`docs/MUTATION_REPORT.md\``,
                ``,
                `Next steps:`,
                `1. Download the HTML artifact from the run above.`,
                `2. Identify newly-surviving mutants vs. the baseline in`,
                `   \`docs/MUTATION_REPORT.md\`.`,
                `3. Either add tests to kill them, or update the baseline`,
                `   report + threshold with a rationale.`,
                ``,
                `Close this issue once resolved; the label will let the`,
                `next nightly run reopen a fresh one if the regression`,
                `recurs.`,
              ].join('\n'),
            });

      # Re-raise the Stryker failure so the matrix cell shows red.
      # continue-on-error above only lets us reach the "open issue" step.
      - name: Propagate Stryker exit code
        if: steps.stryker.outcome == 'failure'
        run: |
          echo "Stryker failed for packages/${{ matrix.package }}; see uploaded report."
          exit 1

  # Summary — one job so the README nightly badge reflects mutation,
  # oracle replay, and staging dry-run together.
  summary:
    name: nightly summary
    runs-on: ubuntu-latest
    needs: [mutation, oracle-replay, staging-dry-run]
    if: always()
    steps:
      - name: Report nightly outcome
        run: |
          echo "mutation:       ${{ needs.mutation.result }}"
          echo "oracle-replay:  ${{ needs.oracle-replay.result }}"
          echo "staging-dry-run: ${{ needs.staging-dry-run.result }}"
          failed=0
          check() {
            local job="$1" result="$2"
            if [[ "$result" != "success" ]]; then
              echo "FAIL: $job ($result)"
              failed=1
            fi
          }
          check mutation "${{ needs.mutation.result }}"
          check oracle-replay "${{ needs.oracle-replay.result }}"
          check staging-dry-run "${{ needs.staging-dry-run.result }}"
          if [[ "$failed" -eq 0 ]]; then
            echo "Nightly green — mutation, oracle replay, staging dry-run."
            exit 0
          fi
          echo "Nightly red — see failed job(s) above."
          exit 1

  oracle-replay:
    name: oracle replay (legacy docker + worker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      # voidzero-dev/setup-vp v1.1.0
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Start legacy oracle (docker)
        run: docker compose -f tests/oracle/docker-compose.yml up --build -d

      - name: Wait for oracle health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/_rooms >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "oracle did not become ready" >&2
          docker compose -f tests/oracle/docker-compose.yml logs
          exit 1

      - name: Replay recorded scenarios against legacy oracle
        run: vp run @ethercalc/oracle-harness#replay --target http://127.0.0.1:8000 --ws-transport socketio

      - name: Build assets for worker replay
        run: |
          vp run @ethercalc/client#build
          vp run @ethercalc/client-multi#build
          bun scripts/build-assets.ts

      - name: Replay against worker (wrangler dev)
        run: |
          # wrangler must run from packages/worker; replay from repo root.
          # Room-index routes must match legacy oracle (wrangler.toml defaults
          # ETHERCALC_CORS=1 which gates /_rooms* and /_exists).
          (cd packages/worker && vp exec wrangler dev --port 8787 --ip 127.0.0.1 --var ETHERCALC_DISABLE_ROOM_INDEX:0) &
          pid=$!
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8787/_health >/dev/null 2>&1 && break
            sleep 2
          done
          vp run @ethercalc/oracle-harness#replay --target http://127.0.0.1:8787
          kill $pid || true

      - name: Tear down oracle
        if: always()
        run: docker compose -f tests/oracle/docker-compose.yml down -v

  staging-dry-run:
    name: wrangler deploy --dry-run (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # voidzero-dev/setup-vp v1.1.0
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build client assets
        run: |
          vp run @ethercalc/client#build
          vp run @ethercalc/client-multi#build
          bun scripts/build-assets.ts

      - name: wrangler deploy --dry-run --env staging
        run: vp exec wrangler deploy --dry-run --env staging
        working-directory: packages/worker
