name: LemmaScript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lemmascript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dafny:
    name: lsc check (Dafny)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # voidzero-dev/setup-vp v1.1.0
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277
        with:
          cache: true

      - name: Setup Dafny
        uses: dafny-lang/setup-dafny-action@v1
        with:
          dafny-version: "4.9.0"

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Generate + check Dafny models
        run: vp run verify:dafny

      # Fail if committed .dfy / .dfy.gen drifted from what check just wrote.
      # (No hand proofs on this facade — files must stay byte-identical.)
      - name: Assert Dafny artifacts committed-fresh
        run: |
          git diff --exit-code -- lemma/xlsx-a1.dfy lemma/xlsx-a1.dfy.gen

  lean-gen:
    name: lsc gen (Lean)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # voidzero-dev/setup-vp v1.1.0
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      # Full `lake build` needs sibling Loom/Velvet/LemmaScript checkouts and
      # solver downloads; CI only asserts Lean backend generation succeeds.
      # verify:context is intentionally NOT run here — it needs sibling
      # ../socialcalc/lemma/a1.{ts,dfy}.
      - name: Generate Lean models from facade
        run: vp run verify:lean:gen

      - name: Assert Lean artifacts non-empty
        shell: bash
        run: |
          test -s lemma/xlsx-a1.types.lean
          test -s lemma/xlsx-a1.def.lean

      - name: Assert Lean artifacts committed-fresh
        run: |
          git diff --exit-code -- lemma/xlsx-a1.def.lean lemma/xlsx-a1.types.lean
