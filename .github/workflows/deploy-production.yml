name: Deploy Production

# Manual production deploy to Cloudflare Workers (ethercalc.net).
# Requires repository secrets:
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account id
#   CLOUDFLARE_API_TOKEN — long-lived dashboard API token (preferred), OR
#   CLOUDFLARE_OAUTH_REFRESH_TOKEN — wrangler-login refresh token (scripts/ci-cloudflare-token.sh)
#
# Does NOT run automatically; invoke via Actions → Deploy Production → Run workflow.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deploy to ethercalc.net'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy (production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.confirm == 'deploy'
    steps:
      - uses: actions/checkout@v6

      # voidzero-dev/setup-vp v1.1.0
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build client assets
        run: |
          vp run @ethercalc/client#build
          vp run @ethercalc/client-multi#build
          bun scripts/build-assets.ts

      - name: Cloudflare API token
        run: ./scripts/ci-cloudflare-token.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_OAUTH_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_OAUTH_REFRESH_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: vp exec wrangler deploy --env=""
        working-directory: packages/worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy smoke (optional)
        if: vars.PRODUCTION_SMOKE_URL != ''
        run: curl -sf "${{ vars.PRODUCTION_SMOKE_URL }}/_health"

  rejected:
    name: confirmation check
    runs-on: ubuntu-latest
    if: inputs.confirm != 'deploy'
    steps:
      - name: Abort — confirmation mismatch
        run: |
          echo 'Input confirm must be exactly "deploy". Got:' "${{ inputs.confirm }}"
          exit 1